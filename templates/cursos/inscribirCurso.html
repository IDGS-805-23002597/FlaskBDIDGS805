{% extends "layout.html" %}
{% block container %}

<div class="flex flex-col items-center justify-center min-h-screen py-20 px-4 bg-gray-50">

    <div class="relative bg-white max-w-xs w-full p-8 border border-gray-100 rounded-[2.5rem] shadow-2xl text-center">

        <div class="flex flex-col items-center">

            <img class="w-24 h-24 mb-6 rounded-full object-cover border-4 border-sky-100 shadow-sm"
            src="{{ url_for('static', filename='img/profesor.png') }}"
            alt="Alumno"/>

            <h5 class="mb-1 text-xl font-bold tracking-tight text-gray-800">
                Inscribir Alumno
            </h5>
            <h5 class="mb-0.5 text-lg font-semibold tracking-tight text-gray-600">
                Nombre: {{ alumno.nombre }} {{ alumno.apellidos }}
            </h5>
            <span class="text-sm text-gray-500 mb-6">
                Seleccione un curso
            </span>

            <form action="{{ url_for('inscripciones.inscribirCurso', id=alumno.id) }}" method="POST" class="w-full">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                

                <div class="mb-6">
                    <select name="curso_id" required
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl
                    bg-gray-50 text-gray-700 font-medium
                    focus:outline-none focus:ring-2 focus:ring-sky-400 transition-all cursor-pointer">

                        <option value="" disabled selected>Seleccione un curso</option>

                        {% for curso in cursos %}
                        <option value="{{ curso.id }}">
                            {{ curso.nombre }}
                        </option>
                        {% endfor %}

                    </select>
                </div>

                <div class="flex flex-col gap-3">

                    <button type="submit" 
                    class="w-full flex items-center justify-center py-4 rounded-xl text-white font-black text-xs uppercase tracking-[0.2em] bg-blue-600 hover:bg-blue-700 shadow-lg hover:shadow-blue-500/30 transition-all transform hover:-translate-y-1 active:scale-95">
                    <i class="fas fa-check-circle mr-2 text-lg"></i> Inscribir
                </button>

                    <a href="{{ url_for('alumnos.index') }}" 
   class="text-xs font-bold text-gray-400 hover:text-gray-600 uppercase tracking-widest transition-colors">
    <i class="fa-solid fa-arrow-left mr-2"></i> CANCELAR
</a>
                </div>
            </form>
        </div>

    </div>
</div>

{% endblock %}
